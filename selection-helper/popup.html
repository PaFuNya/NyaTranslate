<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <title>NyaTransalte</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --accent: #5b6af0;
      --accent-soft: #eef0ff;
      --bg: #ffffff;
      --border: #e5e7eb;
      --text-primary: #111827;
      --text-secondary: #6b7280;
      --text-muted: #9ca3af;
      --success: #16a34a;
      --success-bg: #f0fdf4;
      --warning: #d97706;
      --warning-bg: #fffbeb;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
        'Microsoft YaHei', sans-serif;
      --radius: 10px;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-primary);
      width: 320px;
      user-select: none;
    }

    /* ── 顶部 Header ── */
    .popup-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 16px 14px;
      border-bottom: 1px solid var(--border);
    }

    .popup-logo {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: linear-gradient(135deg, #5b6af0 0%, #7c3aed 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 3px 10px rgba(91, 106, 240, 0.35);
    }

    .popup-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.2;
    }

    .popup-subtitle {
      font-size: 11.5px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .popup-version {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'SF Mono', monospace;
      background: #f3f4f6;
      padding: 2px 7px;
      border-radius: 4px;
    }

    /* ── 状态区 ── */
    .status-section {
      padding: 14px 16px 10px;
    }

    .status-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .status-grid {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .status-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      border-radius: var(--radius);
      background: #f9fafb;
      border: 1px solid var(--border);
    }

    .status-item-name {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot--ok {
      background: var(--success);
    }

    .status-dot--missing {
      background: #d1d5db;
    }

    .status-badge {
      font-size: 11.5px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 5px;
    }

    .status-badge--ok {
      color: var(--success);
      background: var(--success-bg);
    }

    .status-badge--missing {
      color: var(--text-muted);
      background: #f3f4f6;
    }

    /* ── 首选模型行 ── */
    .pref-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      border-radius: var(--radius);
      background: var(--accent-soft);
      border: 1px solid rgba(91, 106, 240, 0.15);
      margin-top: 6px;
    }

    .pref-row-label {
      font-size: 12.5px;
      font-weight: 500;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pref-row-value {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
    }

    /* ── 提示条（未配置 Key 时展示） ── */
    .warning-banner {
      display: none;
      align-items: center;
      gap: 8px;
      margin: 0 16px 12px;
      padding: 8px 12px;
      background: var(--warning-bg);
      border: 1px solid #fde68a;
      border-radius: var(--radius);
      font-size: 12px;
      color: var(--warning);
      line-height: 1.5;
    }

    .warning-banner.visible {
      display: flex;
    }

    /* ── 分割线 ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 2px 0;
    }

    /* ── 底部操作栏 ── */
    .popup-footer {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .btn-settings {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      font-family: var(--font);
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      flex: 1;
      justify-content: center;
    }

    .btn-settings:hover {
      background: #4554e8;
      box-shadow: 0 3px 10px rgba(91, 106, 240, 0.3);
      transform: translateY(-1px);
    }

    .btn-settings:active {
      transform: translateY(0);
      box-shadow: none;
    }

    /* 使用提示 */
    .usage-tip {
      font-size: 11.5px;
      color: var(--text-muted);
      line-height: 1.5;
      text-align: center;
      padding: 0 16px 12px;
    }

    .usage-tip strong {
      color: var(--text-secondary);
    }
  </style>
</head>

<body>

  <!-- 顶部 Header -->
  <div class="popup-header">
    <div class="popup-logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
      </svg>
    </div>
    <div>
      <div class="popup-title">NyaTransalte</div>
      <div class="popup-subtitle">AI 驱动的翻译与术语解释</div>
    </div>
    <div class="popup-version">v2.0</div>
  </div>

  <!-- 配置状态 -->
  <div class="status-section">
    <div class="status-label">API 配置状态</div>
    <div class="status-grid">

      <div class="status-item" id="item-deepseek">
        <div class="status-item-name">
          <span class="status-dot" id="dot-deepseek"></span>
          DeepSeek
        </div>
        <span class="status-badge" id="badge-deepseek">检测中…</span>
      </div>

      <div class="status-item" id="item-qwen">
        <div class="status-item-name">
          <span class="status-dot" id="dot-qwen"></span>
          通义千问
        </div>
        <span class="status-badge" id="badge-qwen">检测中…</span>
      </div>

      <div class="pref-row" id="pref-row">
        <div class="pref-row-label">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
          </svg>
          首选模型
        </div>
        <span class="pref-row-value" id="pref-value">—</span>
      </div>

    </div>
  </div>

  <!-- 未配置警告 -->
  <div class="warning-banner" id="warning-banner">
    <span>⚠️</span>
    <span>尚未配置 API Key，请先进入设置页面填写。</span>
  </div>

  <div class="divider"></div>

  <!-- 底部操作按钮 -->
  <div class="popup-footer">
    <button class="btn-settings" id="btn-open-settings">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3" />
        <path
          d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
      </svg>
      打开设置
    </button>
  </div>

  <div class="usage-tip">
    在任意页面<strong>划选文字</strong>，点击气泡图标即可查询
  </div>

  <script src="popup.js"></script>
</body>

</html>
