<!DOCTYPE html>
<html lang="zh-CN" class="nya-extension-ui" data-theme="light" data-theme-mode="system" data-palette="ocean"
  data-background="tonal">

<head>
  <meta charset="UTF-8" />
  <title>NyaTranslate-喵译</title>
  <link rel="stylesheet" href="theme.css" />
  <link rel="stylesheet" href="popup.css" />
</head>

<body>

  <!-- Header -->
  <div class="popup-header">
    <div class="popup-logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
      </svg>
    </div>
    <div>
      <div class="popup-title">NyaTranslate-喵译</div>
      <div class="popup-subtitle">多模型 AI 翻译 · 视觉识别</div>
    </div>
    <div class="popup-version">v3.1</div>
  </div>

  <!-- Tab 切换栏 -->
  <div class="tab-bar">
    <button class="tab-btn tab-btn--active" data-tab="status">⚡ 状态</button>
    <button class="tab-btn" data-tab="history">📜 翻译历史</button>
  </div>

  <!-- ── Tab: 状态 ── -->
  <div class="tab-pane tab-pane--active" id="tab-status">

    <div class="status-section">
      <div class="status-label">协议配置状态</div>
      <div class="status-grid">

        <div class="status-item">
          <div class="status-item-name">
            <span class="status-dot" id="dot-openai"></span>
            OpenAI 兼容协议
          </div>
          <span class="status-badge" id="badge-openai">检测中…</span>
        </div>

        <div class="status-item">
          <div class="status-item-name">
            <span class="status-dot" id="dot-anthropic"></span>
            Anthropic 协议
          </div>
          <span class="status-badge" id="badge-anthropic">检测中…</span>
        </div>

      </div>

      <div class="status-label" style="margin-top:10px;">模型列表（划词 / 截图共用）</div>
      <div class="status-grid">

        <div class="status-item">
          <div class="status-item-name">
            <svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" style="flex-shrink:0">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
            已启用模型
          </div>
          <span class="status-badge" id="badge-models-summary" style="font-family:monospace;font-size:10.5px;">—</span>
        </div>

      </div>
    </div>

    <!-- 截图快捷键提示（移除按钮，改为文字提示） -->
    <div class="shortcut-hint">
      <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round">
        <rect x="2" y="6" width="20" height="12" rx="2"/>
        <path d="M6 10h0M10 10h0M14 10h0M18 10h0M8 14h8"/>
      </svg>
      截图翻译：按 <kbd>Alt+Shift+S</kbd> 或右键菜单
    </div>

    <!-- 未配置警告 -->
    <div class="warning-banner" id="warning-banner">
      <span>⚠️</span>
      <span>尚未为已启用的模型填写完整凭证（API Key 与 Base URL），或未启用任何模型，请进入设置页。</span>
    </div>

    <div class="divider"></div>

    <div class="popup-footer">
      <button class="btn-settings" id="btn-open-settings">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        打开设置
      </button>
    </div>

    <div class="usage-tip">在任意页面<strong>划选文字</strong>，点击气泡图标即可查询</div>

  </div>

  <!-- ── Tab: 翻译历史 ── -->
  <div class="tab-pane" id="tab-history">
    <div class="history-pane">
      <div class="history-toolbar">
        <span class="history-count" id="history-count">加载中…</span>
        <button class="btn-clear" id="btn-clear-history">🗑 清空历史</button>
      </div>
      <div class="history-list" id="history-list">
        <div class="history-empty">暂无翻译记录喵~</div>
      </div>
    </div>
  </div>

  <script src="appearance.js"></script>
  <script src="popup.js"></script>
</body>

</html>
